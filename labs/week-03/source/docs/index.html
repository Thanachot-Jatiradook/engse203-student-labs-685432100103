<!doctype html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ENGSE203 LAB 3</title>
  <script type="module" crossorigin src="/engse203-lab03-68543210010-3/assets/index-HtRep9Eh.js"></script>
  <link rel="stylesheet" crossorigin href="/engse203-lab03-68543210010-3/assets/index-CRiSB2Ul.css">
</head>

<body>
    <header class="hero">
        <div class="container">
            <p class="eyebrow">ENGSE203 • LAB 3</p>
            <h1>Campus Service Request</h1>
            <p>Responsive Web UI, Event and Form</p>
        </div>
    </header>

    <main class="container page-grid">
        <section class="panel" aria-labelledby="form-title">
            <h2 id="form-title">Create Service Request</h2>
            <form id="request-form" novalidate>
                <div class="form-field">
                    <label for="requester-name">Requester Name</label>
                    <input id="requester-name" name="requesterName" type="text" placeholder="Enter your name" required aria-describedby="requester-name-error" aria-invalid="false" />
                    <p id="requester-name-error" class="error-message" role="alert" aria-live="polite"></p>
                </div>

                <div class="form-field">
                    <label for="request-type">Request Type</label>
                    <select id="request-type" name="requestType" required aria-describedby="request-type-error" aria-invalid="false">
                        <option value="" disabled selected>Select a type</option>
                        <option value="maintenance">Maintenance</option>
                        <option value="security">Security</option>
                        <option value="cleaning">Cleaning</option>
                        <option value="other">Other</option>
                    </select>
                    <p id="request-type-error" class="error-message" role="alert" aria-live="polite"></p>
                </div>

                <div class="form-field">
                    <label for="request-details">Details</label>
                    <textarea id="request-details" name="details" rows="4" placeholder="Describe the request" required aria-describedby="request-details-error" aria-invalid="false"></textarea>
                    <p id="request-details-error" class="error-message" role="alert" aria-live="polite"></p>
                </div>

                <button type="submit">Submit Request</button>
                <p id="form-status" class="status" role="status"></p>
            </form>
        </section>

        <aside class="panel preview-panel" aria-labelledby="preview-title">
            <h2 id="preview-title">Live Preview</h2>
            <dl id="preview" aria-live="polite">
                <div>
                    <dt>Name</dt>
                    <dd id="preview-name">ยังไม่ระบุชื่อ</dd>
                </div>
                <div>
                    <dt>Type</dt>
                    <dd id="preview-type">ยังไม่เลือกประเภท</dd>
                </div>
                <div>
                    <dt>Details</dt>
                    <dd id="preview-details">ยังไม่มีรายละเอียด</dd>
                </div>
            </dl>
            <h3>Submitted Requests</h3>
            <ul id="request-list" class="request-list"></ul>
        </aside>
    </main>
</body>

</html>
